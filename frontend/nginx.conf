# smokeping-easy — nginx (serves the static SPA, proxies /api and /smokeping).
# Dropped in as /etc/nginx/conf.d/default.conf, so directives here run inside
# the http{} context of the unprivileged nginx image (listens on 8080, uid 101).

# Rate limits (per client IP). Docker's embedded DNS resolves upstreams.
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=10r/m;

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;
    client_max_body_size 256k;

    # Resolve upstreams at request time so container restarts don't wedge nginx.
    resolver 127.0.0.11 valid=30s;

    # --- Security headers (applied to every response) ----------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; font-src 'self'; frame-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; object-src 'none'" always;

    # --- Health check ------------------------------------------------------
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # --- Login: stricter rate limit ---------------------------------------
    location = /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        set $backend backend;
        proxy_pass http://$backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- API ---------------------------------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        set $backend backend;
        proxy_pass http://$backend:8000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # --- Smokeping native graphs (read-only), proxied ----------------------
    # The bundled Smokeping web UI (a separate app) ships its own inline and
    # external scripts and inline styles. We relax the CSP for THIS path only,
    # so those scripts run and the graphs render, while the smokeping-easy app
    # keeps the strict server-level CSP. (nginx add_header in a location
    # replaces the parent headers, so we re-declare the ones we still want.)
    location /smokeping/ {
        set $smokeping smokeping;
        proxy_pass http://$smokeping:80$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'" always;
    }

    # --- Static SPA --------------------------------------------------------
    location / {
        try_files $uri $uri/ =404;
    }
}
